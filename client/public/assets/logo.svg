  <path d="M256 130c-40 0-74 24-88 58-6-3-14-6-21-6-28 0-51 23-51 51 0 5 1 10 2 14-20 12-34 34-34 60 0 38 31 70 70 70h244c38 0 70-32 70-70 0-26-14-48-34-60 1-4 2-9 2-14 0-28-23-51-51-51-7 0-15 3-21 6-14-34-48-58-88-58z"
